<!DOCTYPE html>
<html lang="pt-br">
<head>
    <audio controls>
  <source src="meusom.mp3" type="audio/mpeg">
</audio>
<meta charset="UTF-8">
<title>Um presente pra você</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff5fa2,#7f00ff,#00ffd5);
    font-family: Arial, Helvetica, sans-serif;
}

.presente{
    width:180px;
    height:160px;
    background:#ff2e63;
    position:relative;
    cursor:pointer;
    border-radius:10px;
    box-shadow:0 0 30px rgba(0,0,0,.4);
    animation: pulse 1.5s infinite;
}

.tampa{
    position:absolute;
    top:-35px;
    left:-10px;
    width:200px;
    height:40px;
    background:#c9184a;
    border-radius:10px;
}

.laco{
    position:absolute;
    left:50%;
    top:-35px;
    transform:translateX(-50%);
    width:20px;
    height:195px;
    background:#fff;
}

.texto{
    position:absolute;
    width:100%;
    bottom:-50px;
    text-align:center;
    color:white;
    font-size:18px;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}
</style>
</head>
<body>

<div onclick="abrir()" class="presente">
    <div class="tampa"></div>
    <div class="laco"></div>
    <div class="texto">Clique no presente 🎁</div>
</div>

<script>
function abrir(){
    window.location.href = "surpresa.html";
}
</script>

</body>
</html>
